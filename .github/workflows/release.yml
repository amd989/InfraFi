name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  prep:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      pkg_version: ${{ steps.v.outputs.pkg_version }}
      is_prerelease: ${{ steps.v.outputs.is_prerelease }}
    steps:
      - name: Parse tag
        id: v
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # RPM/DEB disallow '-' in upstream version; '~' sorts before release
          PKG_VERSION="${TAG//-/\.}"
          if [[ "$TAG" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Tag=$TAG pkg=$PKG_VERSION prerelease=$IS_PRERELEASE"

  build-flipper:
    name: Build Flipper App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
        id: build-app
        with:
          sdk-channel: release

      - name: Upload .fap artifact
        uses: actions/upload-artifact@v5
        with:
          name: infrafi-fap
          path: ${{ steps.build-app.outputs.fap-artifacts }}

  build-deb:
    name: Build .deb (${{ matrix.arch }})
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            docker_platform: linux/amd64
          - arch: arm64
            docker_platform: linux/arm64
          - arch: armhf
            docker_platform: linux/arm/v7
          - arch: armel
            docker_platform: linux/arm/v6

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build .deb package
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "$PWD":/build -w /build \
            debian:bookworm bash -c '
              set -e
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential debhelper
              # Update changelog version from tag ("~" sorts before release per Debian policy)
              sed -i "1s/([^)]*)/('"${{ needs.prep.outputs.pkg_version }}"'-1)/" debian/changelog
              dpkg-buildpackage -us -uc -b
              mkdir -p output
              mv ../*.deb output/
            '

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v5
        with:
          name: deb-${{ matrix.arch }}
          path: output/*.deb

  build-rpm:
    name: Build .rpm (${{ matrix.arch }})
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            docker_platform: linux/amd64
          - arch: aarch64
            docker_platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build .rpm package
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "$PWD":/build -w /build \
            rockylinux:9 bash -c '
              set -e
              dnf install -y gcc make kernel-headers rpm-build systemd-rpm-macros
              # RPM disallows "-" in Version; tag "v0.0.1-beta" → "0.0.1~beta" (sorts before 0.0.1)
              VERSION='"${{ needs.prep.outputs.pkg_version }}"'
              # Create source tarball
              mkdir -p /root/rpmbuild/{SOURCES,SPECS}
              tar czf "/root/rpmbuild/SOURCES/infrafid-${VERSION}.tar.gz" \
                --transform "s,^\.,infrafid-${VERSION}," \
                --exclude=.git .
              cp rpm/infrafid.spec /root/rpmbuild/SPECS/
              rpmbuild -bb --define "_version ${VERSION}" /root/rpmbuild/SPECS/infrafid.spec
              mkdir -p /build/output
              cp /root/rpmbuild/RPMS/*/*.rpm /build/output/
            '

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v5
        with:
          name: rpm-${{ matrix.arch }}
          path: output/*.rpm

  release:
    needs: [prep, build-flipper, build-deb, build-rpm]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: packages
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*.deb
            packages/*.rpm
            packages/*.fap
          generate_release_notes: true
          prerelease: ${{ needs.prep.outputs.is_prerelease == 'true' }}

  publish-repos:
    needs: [prep, build-deb, build-rpm]
    # Prereleases (e.g. v0.0.1-beta) skip the stable apt/yum repos to avoid
    # pushing preview builds to users running `apt install infrafid`.
    if: needs.prep.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Initialize gh-pages if needed
        run: |
          if [ ! -f index.html ]; then
            git init
            git checkout -b gh-pages
          fi

      - name: Download deb artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: deb-*
          path: incoming-deb
          merge-multiple: true

      - name: Download rpm artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: rpm-*
          path: incoming-rpm
          merge-multiple: true

      - name: Install repo tools
        run: sudo apt-get update && sudo apt-get install -y reprepro createrepo-c

      - name: Import or generate GPG key
        run: |
          if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
            GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          else
            # Generate a temporary key for signing (user should replace with proper key)
            cat > /tmp/gpg-batch <<GPGEOF
              %no-protection
              Key-Type: RSA
              Key-Length: 4096
              Subkey-Type: RSA
              Subkey-Length: 4096
              Name-Real: infrafid
              Name-Email: amd989@users.noreply.github.com
              Expire-Date: 0
          GPGEOF
            gpg --batch --gen-key /tmp/gpg-batch
            GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
            echo "::warning::Using auto-generated GPG key. For production, add GPG_PRIVATE_KEY secret."
          fi
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          gpg --armor --export "$GPG_KEY_ID" > gpg.key

      - name: Configure reprepro
        run: |
          mkdir -p conf
          cat > conf/distributions <<EOF
          Origin: infrafid
          Label: infrafid
          Codename: stable
          Architectures: amd64 arm64 armhf armel
          Components: main
          Description: InfraFi IR WiFi credential receiver daemon
          SignWith: ${{ env.GPG_KEY_ID }}
          EOF

      - name: Add deb packages to APT repo
        run: |
          for deb in incoming-deb/*.deb; do
            reprepro includedeb stable "$deb"
          done

      - name: Create YUM/DNF repo
        run: |
          rm -rf rpm/packages rpm/repodata
          mkdir -p rpm/packages
          cp incoming-rpm/*.rpm rpm/packages/
          gpg --batch --pinentry-mode loopback --detach-sign --armor rpm/packages/*.rpm 2>/dev/null || true
          createrepo_c rpm/
          gpg --batch --pinentry-mode loopback --detach-sign --armor rpm/repodata/repomd.xml

      - name: Create index page
        run: |
          cat > index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><title>InfraFi Package Repository</title></head>
          <body>
          <h1>InfraFi Package Repository</h1>
          <p>IR WiFi credential receiver daemon for Linux servers with CIR receivers.</p>

          <h2>Debian / Ubuntu / Mint (apt)</h2>
          <h3>Quick Install</h3>
          <pre>
          curl -fsSL https://amd989.github.io/InfraFi/setup.sh | sudo bash
          sudo apt install infrafid
          </pre>
          <h3>Manual Setup</h3>
          <pre>
          curl -fsSL https://amd989.github.io/InfraFi/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/infrafid.gpg
          echo "deb [signed-by=/usr/share/keyrings/infrafid.gpg] https://amd989.github.io/InfraFi stable main" | sudo tee /etc/apt/sources.list.d/infrafid.list
          sudo apt update
          sudo apt install infrafid
          </pre>

          <h2>Rocky Linux / RHEL / Fedora (dnf)</h2>
          <h3>Quick Install</h3>
          <pre>
          curl -fsSL https://amd989.github.io/InfraFi/setup-rpm.sh | sudo bash
          sudo dnf install infrafid
          </pre>
          <h3>Manual Setup</h3>
          <pre>
          sudo rpm --import https://amd989.github.io/InfraFi/gpg.key
          sudo tee /etc/yum.repos.d/infrafid.repo &lt;&lt;EOF
          [infrafid]
          name=infrafid
          baseurl=https://amd989.github.io/InfraFi/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://amd989.github.io/InfraFi/gpg.key
          EOF
          sudo dnf install infrafid
          </pre>
          </body>
          </html>
          HTMLEOF

      - name: Create APT setup script
        run: |
          cat > setup.sh <<'SETUPEOF'
          #!/bin/bash
          set -e
          echo "Adding InfraFi APT repository..."
          curl -fsSL https://amd989.github.io/InfraFi/gpg.key | gpg --dearmor -o /usr/share/keyrings/infrafid.gpg
          echo "deb [signed-by=/usr/share/keyrings/infrafid.gpg] https://amd989.github.io/InfraFi stable main" > /etc/apt/sources.list.d/infrafid.list
          apt-get update
          echo "Done! You can now run: sudo apt install infrafid"
          SETUPEOF
          chmod +x setup.sh

      - name: Create DNF setup script
        run: |
          cat > setup-rpm.sh <<'SETUPEOF'
          #!/bin/bash
          set -e
          echo "Adding InfraFi YUM/DNF repository..."
          rpm --import https://amd989.github.io/InfraFi/gpg.key
          cat > /etc/yum.repos.d/infrafid.repo <<REPOEOF
          [infrafid]
          name=infrafid
          baseurl=https://amd989.github.io/InfraFi/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://amd989.github.io/InfraFi/gpg.key
          REPOEOF
          echo "Done! You can now run: sudo dnf install infrafid"
          SETUPEOF
          chmod +x setup-rpm.sh

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Clean up build artifacts, keep repo files
          rm -rf incoming-deb incoming-rpm conf
          git add -A
          git commit -m "Update package repo for ${GITHUB_REF_NAME}" || true
          git push origin gh-pages --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
